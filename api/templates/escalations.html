{% extends "base.html" %}

{% block title %}Signal Escalations{% endblock %}

{% block content %}
<div x-data='escalationFilters({{ escalations|tojson }})' x-init="init()" class="space-y-8">
  <header class="flex flex-col justify-between gap-3 sm:flex-row sm:items-end">
    <div>
      <p class="text-sm font-medium text-stone-500">Escalations</p>
      <h1 class="mt-1 text-2xl font-semibold tracking-tight text-stone-950">Escalation history</h1>
    </div>
    <p x-show="hasOrg" x-cloak class="text-sm text-stone-500">Live</p>
  </header>

  <p x-show="message" x-text="message" x-cloak class="border-l-2 border-stone-300 pl-3 text-sm text-stone-600"></p>

  <div class="space-y-3 border-y border-stone-200 py-4">
    <input
      type="text"
      x-model="searchQuery"
      placeholder="Search escalations by context or agent..."
      class="w-full border border-stone-300 px-4 py-2 text-sm outline-none focus:border-stone-950"
    />
    <div class="flex flex-wrap gap-3">
      <select x-model="filterStatus" class="border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
        <option value="">All statuses</option>
        <option value="resolved">Resolved</option>
        <option value="pending">Pending</option>
      </select>
      <select x-model="filterDecision" class="border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
        <option value="">All decisions</option>
        <option value="approve">Approve</option>
        <option value="reject">Reject</option>
      </select>
      <select x-model="filterRuleCreated" class="border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
        <option value="">Rule created (all)</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>
      <select x-model="filterTag" class="border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
        <option value="">All tags</option>
        <template x-for="tag in allTags" :key="tag">
          <option :value="tag" x-text="tag"></option>
        </template>
      </select>
      <button @click="clearFilters()" class="text-sm font-semibold text-stone-600 underline-offset-4 hover:underline">Clear filters</button>
    </div>
  </div>

<section>
  <div class="overflow-x-auto">
    <table class="min-w-full border-y border-stone-200 text-sm">
      <thead class="border-b border-stone-200 text-left text-stone-500">
        <tr>
          <th class="py-3 pr-4 font-medium">Time</th>
          <th class="px-4 py-3 font-medium">Agent</th>
          <th class="px-4 py-3 font-medium">Context</th>
          <th class="px-4 py-3 font-medium">Tags</th>
          <th class="px-4 py-3 font-medium">Status</th>
          <th class="px-4 py-3 font-medium">Decision</th>
          <th class="px-4 py-3 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-stone-100">
        <template x-for="item in filteredEscalations" :key="item.id || item.time">
        <tr x-data="{ open: false, editingTags: false, newTag: '' }" class="align-top">
          <td class="py-4 pr-4 text-stone-600">
            <div class="flex items-center gap-2">
              <span x-text="item.time"></span>
              <span x-show="item.is_overdue" x-cloak class="rounded bg-red-100 px-2 py-0.5 text-xs font-semibold text-red-700">SLA</span>
            </div>
          </td>
          <td class="px-4 py-4 text-stone-600" x-text="item.agent_id"></td>
          <td class="max-w-xl px-4 py-4">
            <p class="font-medium text-stone-950 cursor-pointer" x-text="item.context_short" @click="open = !open"></p>
            <div class="mt-2 flex flex-wrap gap-1" x-show="contextChips(item).length > 0">
              <template x-for="chip in contextChips(item)" :key="chip.label">
                <span class="border border-stone-200 px-2 py-0.5 text-xs text-stone-600" :title="chip.value" x-text="chip.label + ': ' + chip.value"></span>
              </template>
            </div>
            <div x-show="open" x-cloak class="mt-4 border-l-2 border-stone-200 pl-4">
              <div class="space-y-4 text-stone-700">
                <div>
                  <p class="mb-1 text-xs font-semibold uppercase text-stone-500">Full context</p>
                  <p x-text="item.context"></p>
                </div>
                <div>
                  <p class="mb-1 text-xs font-semibold uppercase text-stone-500">Question</p>
                  <p x-text="item.question || 'N/A'"></p>
                </div>
                <div>
                  <p class="mb-1 text-xs font-semibold uppercase text-stone-500">Metadata</p>
                  <pre class="overflow-auto border-y border-stone-200 py-3 text-xs" x-text="JSON.stringify(item.metadata || {}, null, 2)"></pre>
                </div>
                <template x-if="item.rule">
                  <div class="border-t border-stone-200 pt-3">
                    <p class="mb-1 text-xs font-semibold uppercase text-stone-500">Rule details</p>
                    <p class="font-medium" x-text="item.rule.condition"></p>
                    <p class="mt-1 text-stone-600" x-text="item.rule.action"></p>
                  </div>
                </template>
              </div>
            </div>
          </td>
          <td class="px-4 py-4">
            <div x-show="!editingTags" class="flex flex-wrap gap-1">
              <template x-for="tag in (item.tags || [])" :key="tag">
                <span class="rounded bg-stone-100 px-2 py-0.5 text-xs text-stone-700" x-text="tag"></span>
              </template>
              <button @click="editingTags = true" class="text-xs text-stone-500 hover:text-stone-950">+ Add</button>
            </div>
            <div x-show="editingTags" x-cloak class="space-y-2">
              <div class="flex gap-1">
                <input type="text" x-model="newTag" @keydown.enter="addTag(item, newTag); newTag = ''" placeholder="New tag" class="w-24 rounded border border-stone-300 px-2 py-1 text-xs" />
                <button @click="editingTags = false" class="text-xs text-stone-500">Done</button>
              </div>
              <div class="flex flex-wrap gap-1">
                <template x-for="tag in (item.tags || [])" :key="tag">
                  <button @click="removeTag(item, tag)" class="rounded bg-stone-100 px-2 py-0.5 text-xs text-stone-700 hover:bg-red-100 hover:text-red-700">
                    <span x-text="tag"></span> ×
                  </button>
                </template>
              </div>
            </div>
          </td>
          <td class="px-4 py-4">
            <span class="text-xs font-semibold uppercase tracking-wide"
                  :class="item.status === 'pending' ? 'text-amber-700' : 'text-stone-500'"
                  x-text="item.status"></span>
          </td>
          <td class="px-4 py-4 text-stone-600" x-text="item.human_decision"></td>
          <td class="px-4 py-4">
            <div class="flex items-center gap-2">
              <template x-if="item.status === 'pending'">
                <div class="flex gap-1">
                  <button @click="quickDecision(item, 'approve')" class="rounded bg-emerald-600 px-2 py-1 text-xs font-medium text-white hover:bg-emerald-700">Approve</button>
                  <button @click="quickDecision(item, 'reject')" class="rounded bg-red-600 px-2 py-1 text-xs font-medium text-white hover:bg-red-700">Reject</button>
                </div>
              </template>
              <template x-if="item.status !== 'pending'">
                <span class="text-xs text-stone-400">-</span>
              </template>
            </div>
          </td>
        </tr>
        </template>
        <tr x-show="filteredEscalations.length === 0 && escalations.length === 0" x-cloak><td colspan="7" class="px-4 py-8 text-center text-stone-500">No escalations yet.</td></tr>
        <tr x-show="filteredEscalations.length === 0 && escalations.length > 0" x-cloak><td colspan="7" class="px-4 py-8 text-center text-stone-500">No escalations match your search criteria.</td></tr>
      </tbody>
    </table>
  </div>
</section>
</div>

<script>
  function escalationFilters(initialEscalations) {
    return {
      hasOrg: {{ 'true' if current_org else 'false' }},
      escalations: initialEscalations || [],
      message: "",
      searchQuery: "",
      filterStatus: "",
      filterDecision: "",
      filterRuleCreated: "",
      filterTag: "",
      refreshTimer: null,
      refreshDelayMs: 5000,
      loading: false,
      get allTags() {
        const tags = new Set();
        this.escalations.forEach(item => {
          (item.tags || []).forEach(tag => tags.add(tag));
        });
        return Array.from(tags).sort();
      },
      get filteredEscalations() {
        let filtered = this.escalations;

        // Search filter
        if (this.searchQuery.trim()) {
          const query = this.searchQuery.toLowerCase();
          filtered = filtered.filter(item =>
            (item.context || "").toLowerCase().includes(query) ||
            (item.context_short || "").toLowerCase().includes(query) ||
            (item.agent_id || "").toLowerCase().includes(query)
          );
        }

        // Status filter
        if (this.filterStatus) {
          filtered = filtered.filter(item => (item.status || "").toLowerCase() === this.filterStatus.toLowerCase());
        }

        // Decision filter
        if (this.filterDecision) {
          filtered = filtered.filter(item => (item.human_decision || "").toLowerCase() === this.filterDecision.toLowerCase());
        }

        // Rule created filter
        if (this.filterRuleCreated) {
          if (this.filterRuleCreated === "yes") {
            filtered = filtered.filter(item => item.rule_created && item.rule_created !== "No");
          } else if (this.filterRuleCreated === "no") {
            filtered = filtered.filter(item => !item.rule_created || item.rule_created === "No");
          }
        }

        // Tag filter
        if (this.filterTag) {
          filtered = filtered.filter(item => (item.tags || []).includes(this.filterTag));
        }

        return filtered;
      },
      clearFilters() {
        this.searchQuery = "";
        this.filterStatus = "";
        this.filterDecision = "";
        this.filterRuleCreated = "";
        this.filterTag = "";
        this.syncFilters();
      },
      init() {
        this.escalations = (initialEscalations || []).map((item) => this.normalizeEscalation(item));
        if (!this.hasOrg) {
          this.message = "Select an organization from Organizations to load escalations.";
          return;
        }
        this.hydrateFilters();
        this.$watch("searchQuery", () => this.syncFilters());
        this.$watch("filterStatus", () => this.syncFilters());
        this.$watch("filterDecision", () => this.syncFilters());
        this.$watch("filterRuleCreated", () => this.syncFilters());
        this.$watch("filterTag", () => this.syncFilters());
        this.load(false);
        this.scheduleRefresh();
        window.addEventListener("beforeunload", () => {
          if (this.refreshTimer) clearTimeout(this.refreshTimer);
        });
      },
      hydrateFilters() {
        const params = new URLSearchParams(window.location.search);
        this.searchQuery = params.get("q") || "";
        this.filterStatus = params.get("status") || "";
        this.filterDecision = params.get("decision") || "";
        this.filterRuleCreated = params.get("rule") || "";
        this.filterTag = params.get("tag") || "";
      },
      syncFilters() {
        const params = new URLSearchParams();
        if (this.searchQuery.trim()) params.set("q", this.searchQuery.trim());
        if (this.filterStatus) params.set("status", this.filterStatus);
        if (this.filterDecision) params.set("decision", this.filterDecision);
        if (this.filterRuleCreated) params.set("rule", this.filterRuleCreated);
        if (this.filterTag) params.set("tag", this.filterTag);
        const query = params.toString();
        window.history.replaceState({}, document.title, query ? `${window.location.pathname}?${query}` : window.location.pathname);
      },
      scheduleRefresh(delay = this.refreshDelayMs) {
        if (this.refreshTimer) clearTimeout(this.refreshTimer);
        this.refreshTimer = setTimeout(async () => {
          await this.load(false);
          this.scheduleRefresh();
        }, delay);
      },
      async failureMessage(response, fallback) {
        try {
          const data = await response.json();
          const detail = data?.detail;
          if (typeof detail === "string") return detail;
          if (detail?.message) return detail.message;
        } catch {}
        return fallback;
      },
      truncate(value, length) {
        const text = String(value || "");
        if (text.length <= length) return text;
        return text.slice(0, length - 1).trimEnd() + "...";
      },
      timeAgo(value) {
        if (!value) return "-";
        const then = new Date(value).getTime();
        if (Number.isNaN(then)) return "-";
        const seconds = Math.max(Math.floor((Date.now() - then) / 1000), 0);
        if (seconds < 60) return "just now";
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        return `${Math.floor(hours / 24)}d ago`;
      },
      isOverdue(createdAt) {
        if (!createdAt) return false;
        const created = new Date(createdAt).getTime();
        if (Number.isNaN(created)) return false;
        const hoursSince = (Date.now() - created) / (1000 * 60 * 60);
        return hoursSince > 24; // Consider overdue if older than 24 hours
      },
      normalizeEscalation(item) {
        return {
          ...item,
          time: item.time || this.timeAgo(item.created_at),
          context_short: item.context_short || this.truncate(item.context, 100),
          human_decision: item.human_decision || "-",
          rule_created: item.rule_created || (item.rule_id ? "Yes" : "No"),
          tags: item.tags || [],
          is_overdue: item.status === 'pending' && this.isOverdue(item.created_at),
        };
      },
      contextChips(item) {
        const text = String(item.context || "");
        const chips = [];
        for (const line of text.split(/\n/)) {
          const match = line.trim().match(/^([^:=]{2,32})[:=]\s*(.+)$/);
          if (!match) continue;
          const label = match[1].trim();
          const value = match[2].trim();
          if (!label || !value) continue;
          chips.push({
            label,
            value: value.length > 30 ? value.slice(0, 29).trimEnd() + "..." : value,
          });
          if (chips.length >= 3) break;
        }
        return chips;
      },
      async load(showErrors = true) {
        if (!this.hasOrg) return;
        if (this.loading) return;
        this.loading = true;
        try {
          const response = await fetch("/admin/escalations?limit=100", { credentials: "include" });
          if (!response.ok) {
            this.refreshDelayMs = Math.min(this.refreshDelayMs * 2, 60000);
            if (showErrors) this.message = await this.failureMessage(response, `Could not refresh escalations (${response.status}).`);
            return;
          }
          const data = await response.json();
          this.escalations = (data.items || []).map((item) => this.normalizeEscalation(item));
          this.refreshDelayMs = 5000;
        } catch {
          this.refreshDelayMs = Math.min(this.refreshDelayMs * 2, 60000);
          if (showErrors) this.message = "Connection interrupted. Retrying automatically.";
        } finally {
          this.loading = false;
        }
      },
      async quickDecision(item, decision) {
        if (!item.id) return;
        const response = await fetch(`/admin/escalations/${item.id}/quick-decision`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ decision }),
        });
        if (!response.ok) {
          this.message = await this.failureMessage(response, `Failed to ${decision} (${response.status}).`);
          window.signalToast(this.message, "error");
          return;
        }
        this.message = `Escalation ${decision}d successfully.`;
        window.signalToast(this.message, "success");
        await this.load(false);
      },
      async addTag(item, tag) {
        if (!item.id || !tag.trim()) return;
        const newTags = [...(item.tags || []), tag.trim()];
        const response = await fetch(`/admin/escalations/${item.id}/tags`, {
          method: "PATCH",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tags: newTags }),
        });
        if (!response.ok) {
          this.message = await this.failureMessage(response, `Failed to add tag (${response.status}).`);
          window.signalToast(this.message, "error");
          return;
        }
        item.tags = newTags;
        this.message = "Tag added.";
        window.signalToast("Tag added.", "success");
      },
      async removeTag(item, tag) {
        if (!item.id) return;
        const newTags = (item.tags || []).filter(t => t !== tag);
        const response = await fetch(`/admin/escalations/${item.id}/tags`, {
          method: "PATCH",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tags: newTags }),
        });
        if (!response.ok) {
          this.message = await this.failureMessage(response, `Failed to remove tag (${response.status}).`);
          window.signalToast(this.message, "error");
          return;
        }
        item.tags = newTags;
        this.message = "Tag removed.";
        window.signalToast("Tag removed.", "success");
      },
    };
  }
</script>
{% endblock %}
