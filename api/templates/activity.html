{% extends "base.html" %}

{% block title %}Signal Activity{% endblock %}

{% block content %}
<div x-data="agentActivity()" x-init="init()" class="space-y-8">
  <header class="flex flex-col justify-between gap-3 sm:flex-row sm:items-end">
    <div>
      <p class="text-sm font-medium text-stone-500">Activity</p>
      <h1 class="mt-1 text-2xl font-semibold tracking-tight text-stone-950">Agent activity timeline</h1>
    </div>
    <button @click="load(true)" class="text-sm font-semibold text-stone-950 underline-offset-4 hover:underline">Refresh</button>
  </header>

  <p class="max-w-3xl text-sm leading-6 text-stone-600">A chronological view of checks, escalations, and rule changes so you can audit what the agent did and why.</p>
  <p x-show="message" x-text="message" x-cloak class="border-l-2 border-stone-300 pl-3 text-sm text-stone-600"></p>

  <div class="flex flex-wrap gap-3 border-y border-stone-200 py-4">
    <input x-model="searchQuery" type="text" placeholder="Search activity..." class="min-w-0 flex-1 border border-stone-300 px-4 py-2 text-sm outline-none focus:border-stone-950" />
    <select x-model="kindFilter" class="border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
      <option value="">All activity</option>
      <option value="Auto-handled">Auto-handled</option>
      <option value="Checked">Checked</option>
      <option value="Escalated">Escalated</option>
      <option value="Resolved">Resolved</option>
      <option value="Rule created">Rules</option>
    </select>
    <button @click="clearFilters()" class="text-sm font-semibold text-stone-600 underline-offset-4 hover:underline">Clear filters</button>
  </div>

  <div x-show="loading" x-cloak class="space-y-3">
    <div class="h-16 animate-pulse bg-stone-100"></div>
    <div class="h-16 animate-pulse bg-stone-100"></div>
    <div class="h-16 animate-pulse bg-stone-100"></div>
  </div>

  <section x-show="!loading" x-cloak class="border-y border-stone-200">
    <template x-for="item in filteredItems" :key="item.kind + '-' + item.id">
      <article class="border-b border-stone-100 py-5 last:border-b-0">
        <div class="grid gap-4 lg:grid-cols-[9rem_1fr]">
          <div>
            <p class="text-xs font-semibold uppercase tracking-wide" :class="toneClass(item.tone)" x-text="item.kind"></p>
            <p class="mt-1 text-sm text-stone-500" :title="absoluteTime(item.created_at)" x-text="item.time"></p>
          </div>
          <div class="min-w-0">
            <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
              <h2 class="text-sm font-semibold leading-6 text-stone-950" x-text="item.title"></h2>
              <a x-show="item.rule" :href="`/dashboard/rules/${item.rule?.id}`" class="shrink-0 text-xs font-semibold text-stone-950 underline-offset-4 hover:underline">View rule</a>
            </div>
            <p class="mt-2 max-w-4xl text-sm leading-6 text-stone-600" x-text="truncate(item.summary, 240)"></p>
            <template x-if="item.rule">
              <div class="mt-3 border-l-2 border-stone-200 pl-3">
                <p class="text-xs font-semibold uppercase tracking-wide text-stone-500">Rule</p>
                <p class="mt-1 text-sm text-stone-700" x-text="item.rule.condition"></p>
              </div>
            </template>
            <details class="mt-3">
              <summary class="cursor-pointer text-xs font-semibold text-stone-500 underline-offset-4 hover:text-stone-950 hover:underline">Details</summary>
              <pre class="mt-3 max-h-72 overflow-auto border-y border-stone-200 py-3 text-xs text-stone-600" x-text="formatJson(item.context || {})"></pre>
            </details>
          </div>
        </div>
      </article>
    </template>
    <p x-show="filteredItems.length === 0" x-cloak class="py-10 text-sm text-stone-500">No activity matches this view.</p>
  </section>
</div>

<script>
  function agentActivity() {
    return {
      items: [],
      loading: false,
      message: "",
      searchQuery: "",
      kindFilter: "",
      refreshTimer: null,
      get filteredItems() {
        const query = this.searchQuery.trim().toLowerCase();
        return this.items.filter((item) => {
          if (this.kindFilter && item.kind !== this.kindFilter && !(this.kindFilter === "Rule created" && item.kind.startsWith("Rule"))) return false;
          if (!query) return true;
          return [item.kind, item.title, item.summary, item.rule?.condition, item.rule?.action]
            .filter(Boolean)
            .some((value) => String(value).toLowerCase().includes(query));
        });
      },
      init() {
        this.hydrateFilters();
        this.$watch("searchQuery", () => this.syncFilters());
        this.$watch("kindFilter", () => this.syncFilters());
        this.load(true);
        this.refreshTimer = setInterval(() => this.load(false), 7000);
        window.addEventListener("beforeunload", () => {
          if (this.refreshTimer) clearInterval(this.refreshTimer);
        });
      },
      hydrateFilters() {
        const params = new URLSearchParams(window.location.search);
        this.searchQuery = params.get("q") || "";
        this.kindFilter = params.get("kind") || "";
      },
      syncFilters() {
        const params = new URLSearchParams();
        if (this.searchQuery.trim()) params.set("q", this.searchQuery.trim());
        if (this.kindFilter) params.set("kind", this.kindFilter);
        const query = params.toString();
        window.history.replaceState({}, document.title, query ? `${window.location.pathname}?${query}` : window.location.pathname);
      },
      clearFilters() {
        this.searchQuery = "";
        this.kindFilter = "";
        this.syncFilters();
      },
      async failureMessage(response, fallback) {
        try {
          const data = await response.json();
          if (typeof data?.detail === "string") return data.detail;
          if (data?.detail?.message) return data.detail.message;
        } catch {}
        return fallback;
      },
      async load(showLoading = false) {
        if (showLoading) this.loading = true;
        const response = await fetch("/admin/activity", { credentials: "include" });
        if (showLoading) this.loading = false;
        if (!response.ok) {
          this.message = await this.failureMessage(response, `Could not load activity (${response.status}).`);
          window.signalToast(this.message, "error");
          return;
        }
        const data = await response.json();
        this.items = data.items || [];
        this.message = "";
      },
      truncate(value, length) {
        const text = typeof value === "string" ? value : JSON.stringify(value || {});
        if (text.length <= length) return text;
        return text.slice(0, length - 1).trimEnd() + "...";
      },
      formatJson(value) {
        return JSON.stringify(value || {}, null, 2);
      },
      absoluteTime(value) {
        if (!value) return "";
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? "" : date.toLocaleString();
      },
      toneClass(tone) {
        if (tone === "success") return "text-emerald-700";
        if (tone === "warning") return "text-amber-700";
        return "text-stone-500";
      },
    };
  }
</script>
{% endblock %}
