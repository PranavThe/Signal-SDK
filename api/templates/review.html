{% extends "base.html" %}

{% block title %}Signal Review{% endblock %}

{% block content %}
<div x-data="reviewQueue()" x-init="load()" class="space-y-8">
  <header>
    <p class="text-sm font-medium text-stone-500">Review</p>
    <h1 class="mt-1 text-2xl font-semibold tracking-tight text-stone-950">Decision queue</h1>
  </header>

  <p x-show="message" x-text="message" x-cloak class="border-l-2 border-stone-300 pl-3 text-sm text-stone-600"></p>

  <section class="border-y border-stone-200 py-5">
    <div class="flex flex-col justify-between gap-3 sm:flex-row sm:items-end">
      <div>
        <h2 class="font-semibold">Open decisions</h2>
        <p class="mt-1 text-sm text-stone-500">Unresolved escalations and proposed rules.</p>
      </div>
      <button @click="load()" class="text-sm font-semibold text-stone-950 underline-offset-4 hover:underline">Refresh</button>
    </div>
  </section>

  <p x-show="!hasOrg" class="text-sm text-stone-500">Select an organization in <a href="/dashboard/settings" class="font-semibold underline-offset-4 hover:underline">Settings</a> to load your review queue.</p>
  <p x-show="hasOrg && loading" x-cloak class="text-sm text-stone-500">Loading decisions...</p>
  <p x-show="hasOrg && !loading && items.length === 0" x-cloak class="text-sm text-stone-500">No decisions waiting.</p>

  <div class="space-y-4" x-show="items.length > 0" x-cloak>
    <template x-for="item in items" :key="item.id">
      <section class="border border-stone-200">
        <!-- Header with stage and metadata -->
        <div class="border-b border-stone-200 bg-stone-50 p-4">
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
              <div class="flex items-center gap-3">
                <span :class="stageClass(item.stage)" class="text-xs font-semibold uppercase tracking-wide" x-text="stageLabel(item)"></span>
                <span class="text-xs text-stone-500" x-text="item.agent_id"></span>
                <span class="text-xs text-stone-400" x-text="item.created"></span>
              </div>
              <h2 class="mt-2 text-base font-semibold text-stone-950" x-text="item.question"></h2>
            </div>
          </div>
        </div>

        <!-- Main content area -->
        <div class="p-6">
          <!-- STAGE 1: Decision Needed -->
          <template x-if="item.stage === 'decision'">
            <div class="space-y-6">
              <div>
                <p class="text-xs font-semibold uppercase tracking-wide text-stone-500">Context</p>
                <p class="mt-2 text-sm leading-relaxed text-stone-700" x-text="item.context"></p>
              </div>

              <template x-if="item.similar_decisions && item.similar_decisions.length > 0">
                <div>
                  <p class="text-xs font-semibold uppercase tracking-wide text-stone-500">Similar past decisions</p>
                  <div class="mt-3 space-y-2">
                    <template x-for="decision in item.similar_decisions" :key="`${item.id}-${decision.context}`">
                      <div class="border border-stone-200 bg-stone-50 p-3">
                        <p class="text-xs font-medium text-stone-600" x-text="`${decision.human_decision} · ${decision.time_ago} · ${decision.similarity}`"></p>
                        <p class="mt-1 text-sm text-stone-700" x-text="decision.context"></p>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <div class="border-t border-stone-200 pt-6">
                <p class="mb-3 text-sm font-medium text-stone-950">What should the agent do?</p>
                <div class="flex gap-3">
                  <button @click="decide(item.id, 'approve')" class="border border-emerald-600 bg-emerald-50 px-4 py-2 text-sm font-semibold text-emerald-700 hover:bg-emerald-100">Approve</button>
                  <button @click="decide(item.id, 'reject')" class="border border-red-600 bg-red-50 px-4 py-2 text-sm font-semibold text-red-700 hover:bg-red-100">Reject</button>
                </div>
              </div>
            </div>
          </template>

          <!-- STAGE 2: Should this be a rule? -->
          <template x-if="item.stage === 'scope'">
            <div class="space-y-6">
              <div class="border border-emerald-200 bg-emerald-50 p-4">
                <p class="text-sm font-semibold text-emerald-900">Decision recorded</p>
                <p class="mt-1 text-sm text-emerald-800" x-text="`You chose: ${item.human_decision}`"></p>
              </div>

              <div>
                <p class="mb-3 text-sm font-medium text-stone-950">Should this decision apply to similar situations?</p>
                <div class="grid gap-3 sm:grid-cols-2">
                  <button @click="applyBroadly(item.id, true)" class="border border-stone-950 bg-stone-50 p-4 text-left hover:bg-stone-100">
                    <p class="text-sm font-semibold text-stone-950">Create a rule</p>
                    <p class="mt-1 text-sm text-stone-600">Agent will handle similar cases automatically</p>
                  </button>
                  <button @click="applyBroadly(item.id, false)" class="border border-stone-300 p-4 text-left hover:border-stone-400 hover:bg-stone-50">
                    <p class="text-sm font-semibold text-stone-950">One-time only</p>
                    <p class="mt-1 text-sm text-stone-600">Just for this specific case</p>
                  </button>
                </div>
              </div>
            </div>
          </template>

          <!-- STAGE 3: Review and approve rule -->
          <template x-if="item.rule && editingRuleId !== item.rule.id">
            <div class="space-y-6">
              <!-- Conflict warning (if any) -->
              <template x-if="item.rule.conflicts && item.rule.conflicts.length > 0">
                <div class="border border-amber-500 bg-amber-50 p-4">
                  <p class="text-sm font-semibold text-amber-900">⚠ Potential conflict detected</p>
                  <template x-for="conflict in item.rule.conflicts" :key="conflict.existing_rule_id">
                    <div class="mt-3">
                      <p class="text-sm font-medium text-amber-900" x-text="conflict.existing_condition + ' → ' + conflict.existing_action"></p>
                      <p class="mt-1 text-sm text-amber-800" x-text="conflict.explanation"></p>
                    </div>
                  </template>
                  <p class="mt-3 text-sm text-amber-900">You must edit this rule before approving.</p>
                </div>
              </template>

              <!-- Proposed rule -->
              <div class="border border-stone-200 p-4">
                <p class="text-xs font-semibold uppercase tracking-wide text-stone-500">Proposed rule</p>
                <div class="mt-4 space-y-4">
                  <div>
                    <p class="text-xs font-semibold text-stone-950">WHEN</p>
                    <p class="mt-1 text-sm leading-relaxed text-stone-700" x-text="item.rule.condition"></p>
                  </div>
                  <div>
                    <p class="text-xs font-semibold text-stone-950">DO</p>
                    <p class="mt-1 text-sm leading-relaxed text-stone-700" x-text="item.rule.action"></p>
                  </div>
                  <div class="flex items-center gap-4 border-t border-stone-200 pt-3 text-xs text-stone-500">
                    <span x-text="item.rule.confidence + ' confidence'"></span>
                    <span x-show="item.rule.exceptions_note" x-text="'Exceptions noted'"></span>
                  </div>
                </div>
              </div>

              <!-- Actions -->
              <div class="border-t border-stone-200 pt-6">
                <div class="flex flex-wrap gap-3">
                  <button
                    x-show="!item.rule.conflicts || item.rule.conflicts.length === 0"
                    @click="approveRule(item.rule.id)"
                    class="border border-emerald-600 bg-emerald-50 px-4 py-2 text-sm font-semibold text-emerald-700 hover:bg-emerald-100">
                    Approve rule
                  </button>
                  <button @click="toggleEdit(item.rule.id)" class="border border-stone-300 px-4 py-2 text-sm font-semibold text-stone-950 hover:border-stone-950 hover:bg-stone-50">
                    Edit rule
                  </button>
                  <button @click="discardRule(item.rule.id)" class="px-4 py-2 text-sm font-semibold text-red-700 underline-offset-4 hover:underline">
                    Discard
                  </button>
                </div>
              </div>
            </div>
          </template>

          <!-- EDIT MODE -->
          <template x-if="item.rule && editingRuleId === item.rule.id">
            <div class="space-y-6">
              <div class="border border-stone-950 bg-stone-50 p-4">
                <p class="text-sm font-semibold text-stone-950">Edit mode</p>
                <p class="mt-1 text-sm text-stone-600">Describe the changes you want to make to this rule.</p>
              </div>

              <div>
                <label class="text-xs font-semibold uppercase tracking-wide text-stone-500">Change instructions</label>
                <textarea
                  x-model="edits[item.rule.id]"
                  rows="4"
                  placeholder="Example: Make the condition more specific by adding a check for user role = admin"
                  class="mt-2 w-full resize-y border border-stone-300 bg-white p-3 text-sm outline-none focus:border-stone-950">
                </textarea>
              </div>

              <div class="border-t border-stone-200 pt-6">
                <div class="flex gap-3">
                  <button @click="submitEdit(item.rule.id)" class="border border-stone-950 bg-stone-50 px-4 py-2 text-sm font-semibold text-stone-950 hover:bg-stone-100">
                    Update rule
                  </button>
                  <button @click="cancelEdit(item.rule.id)" class="px-4 py-2 text-sm font-semibold text-stone-600 underline-offset-4 hover:underline">
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </section>
    </template>
  </div>
</div>

<script>
  function reviewQueue() {
    return {
      hasOrg: {{ 'true' if current_org else 'false' }},
      items: [],
      loading: false,
      message: "",
      editingRuleId: null,
      edits: {},
      headers() {
        return {
          "Content-Type": "application/json",
        };
      },
      async failureMessage(response, fallback) {
        try {
          const data = await response.json();
          const detail = data?.detail;
          if (typeof detail === "string") return detail;
          if (detail?.message) {
            const conflict = (detail.conflicts || [])[0];
            if (conflict) return `${detail.message} ${conflict.existing_condition} → ${conflict.existing_action}. ${conflict.explanation}`;
            return detail.message;
          }
        } catch {}
        return fallback;
      },
      async load() {
        if (!this.hasOrg) {
          this.message = "";
          return;
        }
        this.loading = true;
        const response = await fetch("/admin/review", {
          credentials: "include",
          headers: this.headers(),
        });
        this.loading = false;
        if (!response.ok) {
          this.message = await this.failureMessage(response, `Could not load review queue (${response.status}).`);
          return;
        }
        const data = await response.json();
        this.items = data.items || [];
        this.message = "";
      },
      async post(path, body = {}) {
        if (!this.hasOrg) {
          this.message = "Select an organization in Settings first.";
          return false;
        }
        this.message = "Working...";
        const response = await fetch(path, {
          method: "POST",
          credentials: "include",
          headers: this.headers(),
          body: JSON.stringify(body),
        });
        if (!response.ok) {
          this.message = await this.failureMessage(response, `Action failed (${response.status}).`);
          await this.load();
          return false;
        }
        await this.load();
        this.message = "";
        return true;
      },
      decide(id, decision) {
        return this.post(`/admin/review/escalations/${id}/decision`, { decision });
      },
      applyBroadly(id, applyBroadly) {
        return this.post(`/admin/review/escalations/${id}/apply-broadly`, { apply_broadly: applyBroadly });
      },
      approveRule(ruleId) {
        return this.post(`/admin/review/rules/${ruleId}/approve`);
      },
      discardRule(ruleId) {
        return this.post(`/admin/review/rules/${ruleId}/discard`);
      },
      toggleEdit(ruleId) {
        this.editingRuleId = ruleId;
        this.edits[ruleId] = this.edits[ruleId] || "";
      },
      cancelEdit(ruleId) {
        this.editingRuleId = null;
        this.edits[ruleId] = "";
      },
      async submitEdit(ruleId) {
        const editText = (this.edits[ruleId] || "").trim();
        if (!editText) {
          this.message = "Describe the rule change before updating.";
          return;
        }
        const ok = await this.post(`/admin/review/rules/${ruleId}/edit`, { edit_text: editText });
        if (ok) {
          this.editingRuleId = null;
          this.edits[ruleId] = "";
        }
      },
      formatJson(value) {
        return JSON.stringify(value || {}, null, 2);
      },
      stageLabel(item) {
        if (item.stage === "decision") return "Needs decision";
        if (item.stage === "scope") return "Decide reuse";
        if (item.stage === "rule") return "Review rule";
        return item.finalization_reason || item.status;
      },
      stageClass(stage) {
        if (stage === "decision") return "text-red-700";
        if (stage === "scope") return "text-amber-700";
        if (stage === "rule") return "text-emerald-700";
        return "text-stone-500";
      },
    };
  }
</script>
{% endblock %}
