{% extends "base.html" %}

{% block title %}Signal Organization Settings{% endblock %}

{% block content %}
<div x-data="organizationSettings()" x-init="load()" class="mx-auto max-w-4xl space-y-8">
  <header class="flex flex-col justify-between gap-3 sm:flex-row sm:items-end">
    <div>
      <p class="text-sm font-medium text-stone-500">Organization</p>
      <h1 class="mt-1 text-2xl font-semibold tracking-tight text-stone-950">Organization Settings</h1>
    </div>
    <a href="/dashboard" class="text-sm font-semibold text-stone-950 underline-offset-4 hover:underline">Switch organization</a>
  </header>

  <template x-if="settings === null">
    <section class="border border-stone-200 p-6">
      <p class="text-sm text-stone-500">Loading settings...</p>
    </section>
  </template>

  <template x-if="settings && !settings.organization">
    <section class="border border-stone-200 p-6">
      <h2 class="font-semibold">No organization selected</h2>
      <p class="mt-2 text-sm text-stone-500">Choose an organization before changing review settings or creating API keys.</p>
      <a href="/dashboard" class="mt-5 inline-block text-sm font-semibold text-stone-950 underline-offset-4 hover:underline">Go to organizations</a>
    </section>
  </template>

  <template x-if="settings?.organization">
    <div class="space-y-5">
      <section class="border border-stone-200 p-6">
        <div class="flex flex-col justify-between gap-4 sm:flex-row sm:items-start">
          <div>
            <h2 class="font-semibold">Organization</h2>
            <p class="mt-1 text-sm text-stone-500">The workspace currently open in this dashboard.</p>
          </div>
          <p class="text-lg font-semibold text-stone-950" x-text="settings.organization.name"></p>
        </div>
      </section>

      <section class="border border-stone-200 p-6">
        <div class="flex flex-col justify-between gap-4 sm:flex-row sm:items-start">
          <div>
            <h2 class="font-semibold">API keys</h2>
            <p class="mt-1 text-sm text-stone-500">Create keys for apps, environments, or agents inside this organization.</p>
          </div>
          <div class="flex items-center gap-4">
            <span class="text-sm text-stone-500" x-text="apiKeyUsage()"></span>
            <button
              @click="newKeyOpen = !newKeyOpen; keyMessage = ''"
              :disabled="!canCreateApiKey()"
              :title="canCreateApiKey() ? '' : 'Upgrade your account plan to create more API keys for this organization.'"
              class="border border-stone-950 bg-stone-950 px-3 py-1.5 text-sm font-semibold text-white transition hover:bg-stone-800 disabled:border-stone-200 disabled:bg-stone-100 disabled:text-stone-400"
              x-text="newKeyOpen ? 'Cancel' : 'Add new key'"
            ></button>
          </div>
        </div>

        <p x-show="settings && !canCreateApiKey()" x-cloak class="mt-4 border-l-2 border-stone-300 pl-3 text-sm text-stone-600">This organization has reached the API key limit for your account plan. Upgrade in Account Settings to add more.</p>
        <div x-show="newKeyOpen" x-cloak class="mt-5 border-y border-stone-200 py-4">
          <div class="grid gap-4 sm:grid-cols-[1fr_auto] sm:items-end">
            <div>
              <label class="text-xs font-semibold uppercase tracking-wide text-stone-500" for="new-key-name">Key name</label>
              <input id="new-key-name" x-model="newKeyName" :disabled="!canCreateApiKey()" placeholder="Production" class="mt-2 h-10 w-full border-b border-stone-300 bg-transparent text-sm outline-none focus:border-stone-950 disabled:text-stone-400" />
            </div>
            <button @click="generateNewKey()" :disabled="!canCreateApiKey()" class="h-10 text-sm font-semibold text-stone-950 underline-offset-4 hover:underline disabled:text-stone-300 disabled:no-underline">Create key</button>
          </div>
        </div>

        <div x-show="newlyGeneratedKey" x-cloak class="mt-5 border border-emerald-300 bg-emerald-50 p-4">
          <p class="text-sm font-semibold text-emerald-800">New API key created. Copy it now.</p>
          <div class="mt-2 flex gap-3">
            <input x-model="newlyGeneratedKey" readonly type="text" class="h-10 min-w-0 flex-1 border-b border-emerald-600 bg-transparent font-mono text-sm outline-none" />
            <button @click="copyToClipboard(newlyGeneratedKey)" class="h-10 text-sm font-semibold text-stone-950 underline-offset-4 hover:underline">Copy</button>
          </div>
        </div>

        <div class="mt-5 divide-y divide-stone-100 border-y border-stone-200">
          <template x-for="key in apiKeys" :key="key.id">
            <div class="grid gap-4 py-4 md:grid-cols-[minmax(0,1fr)_minmax(180px,auto)_auto] md:items-center">
              <div class="min-w-0">
                <p class="text-sm font-semibold text-stone-950" x-text="key.name"></p>
                <p class="mt-1 font-mono text-xs text-stone-500" x-text="key.key_prefix + '...'"></p>
              </div>
              <div class="text-sm text-stone-500">
                <p x-text="'Created ' + formatDate(key.created_at)"></p>
                <p x-show="key.last_used_at" x-text="'Used ' + formatDate(key.last_used_at)"></p>
              </div>
              <button @click="revokeApiKey(key)" class="border border-red-200 px-3 py-1.5 text-sm font-semibold text-red-700 transition hover:border-red-700">Revoke</button>
            </div>
          </template>
          <div x-show="apiKeys.length === 0" x-cloak class="py-8">
            <p class="text-sm text-stone-500">No API keys yet.</p>
          </div>
        </div>
      </section>

      <section class="border border-stone-200 p-6">
        <div class="flex flex-col justify-between gap-4 lg:flex-row lg:items-start">
          <div>
            <h2 class="font-semibold">Decision review</h2>
            <p class="mt-1 text-sm text-stone-500">Choose where humans review escalations.</p>
          </div>
          <div class="inline-grid grid-cols-2 border border-stone-300 text-sm">
            <button
              @click="setSlackEnabled(false)"
              class="px-4 py-2 font-semibold transition"
              :class="!settings.organization.slack_notifications_enabled ? 'bg-stone-950 text-white' : 'bg-white text-stone-500 hover:text-stone-950'"
            >Dashboard only</button>
            <button
              @click="setSlackEnabled(true)"
              class="px-4 py-2 font-semibold transition"
              :class="settings.organization.slack_notifications_enabled ? 'bg-stone-950 text-white' : 'bg-white text-stone-500 hover:text-stone-950'"
            >Slack + dashboard</button>
          </div>
        </div>

        <div x-show="settings.organization.slack_notifications_enabled" x-cloak class="mt-5 border-t border-stone-200 pt-5">
          <label class="text-xs font-semibold uppercase tracking-wide text-stone-500" for="slack-channel">Slack channel ID</label>
          <div class="mt-2 flex flex-col gap-3 sm:flex-row">
            <input id="slack-channel" x-model="slackChannelId" placeholder="C0123456789" class="h-10 min-w-0 flex-1 border-b border-stone-300 bg-transparent text-sm outline-none focus:border-stone-950" />
            <button @click="saveSlackChannel()" class="h-10 text-sm font-semibold text-stone-950 underline-offset-4 hover:underline">Save channel</button>
          </div>
          <p class="mt-2 text-sm text-stone-500" x-text="slackStatus()"></p>
        </div>
      </section>

      <section class="border border-red-200 p-6">
        <div class="flex flex-col justify-between gap-4 sm:flex-row sm:items-start">
          <div>
            <h2 class="font-semibold text-red-800">Danger zone</h2>
            <p class="mt-1 text-sm text-stone-500">Delete this organization and all of its rules, escalations, API keys, and training data.</p>
          </div>
          <button x-show="!deleteConfirmOpen" @click="deleteConfirmOpen = true" class="border border-red-200 px-3 py-1.5 text-sm font-semibold text-red-700 transition hover:border-red-700">Delete organization</button>
        </div>
        <div x-show="deleteConfirmOpen" x-cloak class="mt-5 border-t border-red-100 pt-4">
          <p class="text-sm text-stone-600">Type <span class="font-semibold text-stone-950" x-text="settings.organization.name"></span> to confirm.</p>
          <div class="mt-3 flex flex-col gap-3 sm:flex-row">
            <input x-model="deleteConfirmName" class="h-10 min-w-0 flex-1 border-b border-red-300 bg-transparent text-sm outline-none focus:border-red-700" />
            <button @click.stop.prevent="deleteOrganization()" :disabled="deleteConfirmName !== settings.organization.name || deletingOrganization" class="h-10 text-sm font-semibold text-red-700 underline-offset-4 hover:underline disabled:text-stone-300 disabled:no-underline" x-text="deletingOrganization ? 'Deleting...' : 'Delete forever'"></button>
            <button @click.stop.prevent="deleteConfirmOpen = false; deleteConfirmName = ''" :disabled="deletingOrganization" class="h-10 text-sm font-semibold text-stone-500 underline-offset-4 hover:text-stone-950 hover:underline disabled:text-stone-300 disabled:no-underline">Cancel</button>
          </div>
        </div>
      </section>
    </div>
  </template>
</div>

<script>
  function organizationSettings() {
    return {
      settings: null,
      apiKeys: [],
      newKeyName: "",
      newlyGeneratedKey: "",
      slackChannelId: "",
      pageMessage: "",
      keyMessage: "",
      reviewMessage: "",
      newKeyOpen: false,
      deleteConfirmOpen: false,
      deleteConfirmName: "",
      deletingOrganization: false,
      refreshInterval: null,
      headers() {
        return { "Content-Type": "application/json" };
      },
      async failureMessage(response, fallback) {
        try {
          const data = await response.json();
          if (typeof data?.detail === "string") return data.detail;
          if (data?.detail?.message) return data.detail.message;
        } catch {}
        return fallback;
      },
      async load() {
        await this.loadSettings();
        await this.loadApiKeys();
        this.refreshInterval = setInterval(() => this.refresh(), 5000);
        window.addEventListener("beforeunload", () => {
          if (this.refreshInterval) clearInterval(this.refreshInterval);
        });
      },
      async refresh() {
        await this.loadSettings(true);
        await this.loadApiKeys();
      },
      async loadSettings(silent = false) {
        const response = await fetch("/admin/settings", {
          credentials: "include",
          headers: this.headers(),
        });
        if (!response.ok) {
          if (!silent && response.status !== 401) {
            this.pageMessage = await this.failureMessage(response, `Could not load settings (${response.status}).`);
            window.signalToast(this.pageMessage, "error");
          }
          return;
        }
        this.settings = await response.json();
        if (this.settings.organization) {
          this.slackChannelId = this.settings.organization.slack_channel_id || "";
          window.signalRememberOrg(this.settings.organization);
        }
        if (!silent) this.pageMessage = "";
      },
      async loadApiKeys() {
        if (!this.settings?.organization) {
          this.apiKeys = [];
          return;
        }
        const response = await fetch("/admin/api-keys", {
          credentials: "include",
          headers: this.headers(),
        });
        if (!response.ok) {
          this.apiKeys = [];
          return;
        }
        const data = await response.json();
        this.apiKeys = data.items || [];
        this.settings.api_key_limits = {
          count: data.count || this.apiKeys.length,
          limit: data.limit || this.settings.api_key_limits?.limit || 0,
          can_create: Boolean(data.can_create),
        };
      },
      async revokeApiKey(key) {
        if (!key?.id) return;
        if (!window.confirm(`Revoke "${key.name}"? Apps using this key will stop working.`)) return;
        const response = await fetch(`/admin/api-keys/${key.id}`, {
          method: "DELETE",
          credentials: "include",
          headers: this.headers(),
        });
        if (!response.ok) {
          this.keyMessage = await this.failureMessage(response, `Could not revoke key (${response.status}).`);
          window.signalToast(this.keyMessage, "error");
          return;
        }
        const data = await response.json();
        this.keyMessage = data.message || "API key revoked.";
        window.signalToast(this.keyMessage, "success");
        await this.loadSettings(true);
        await this.loadApiKeys();
      },
      async deleteOrganization() {
        if (this.deletingOrganization) return;
        if (!this.settings?.organization || this.deleteConfirmName !== this.settings.organization.name) return;
        this.deletingOrganization = true;
        try {
          const response = await fetch(`/admin/organizations/${this.settings.organization.id}`, {
            method: "DELETE",
            credentials: "include",
          });
          if (!response.ok) {
            this.pageMessage = await this.failureMessage(response, `Could not delete organization (${response.status}).`);
            window.signalToast(this.pageMessage, "error");
            return;
          }
          sessionStorage.removeItem("signal_org_name");
          const result = await response.json();
          window.signalToast(result.message || "Organization deleted.", "success");
          window.location.href = "/dashboard";
        } finally {
          this.deletingOrganization = false;
        }
      },
      apiKeyUsage() {
        if (!this.settings?.organization) return "-";
        const limits = this.settings.api_key_limits || {};
        const limit = limits.limit >= 10000 ? "Custom" : limits.limit;
        return `${limits.count || 0} / ${limit}`;
      },
      canCreateApiKey() {
        return Boolean(this.settings?.organization && this.settings?.api_key_limits?.can_create);
      },
      async generateNewKey() {
        if (!this.newKeyName.trim()) {
          this.keyMessage = "Enter a name for the new key.";
          window.signalToast(this.keyMessage, "error");
          return;
        }
        const response = await fetch("/admin/api-keys/generate", {
          method: "POST",
          credentials: "include",
          headers: this.headers(),
          body: JSON.stringify({ name: this.newKeyName }),
        });
        if (!response.ok) {
          this.keyMessage = await this.failureMessage(response, `Could not create key (${response.status}).`);
          window.signalToast(this.keyMessage, "error");
          return;
        }
        const data = await response.json();
        this.newlyGeneratedKey = data.api_key;
        this.newKeyName = "";
        this.newKeyOpen = false;
        this.keyMessage = data.message;
        window.signalToast("API key created. Copy it now.", "success");
        await this.loadSettings(true);
        await this.loadApiKeys();
      },
      async patch(body, target = "reviewMessage") {
        const response = await fetch("/admin/settings", {
          method: "PATCH",
          credentials: "include",
          headers: this.headers(),
          body: JSON.stringify(body),
        });
        if (!response.ok) {
          this[target] = await this.failureMessage(response, `Could not save settings (${response.status}).`);
          window.signalToast(this[target], "error");
          return;
        }
        this.settings = await response.json();
        if (this.settings.organization) this.slackChannelId = this.settings.organization.slack_channel_id || "";
        this[target] = "Settings saved.";
        window.signalToast("Settings saved.", "success");
      },
      setSlackEnabled(enabled) {
        return this.patch({ slack_notifications_enabled: enabled }, "reviewMessage");
      },
      saveSlackChannel() {
        return this.patch({ slack_channel_id: this.slackChannelId }, "reviewMessage");
      },
      copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          this.keyMessage = "Copied to clipboard.";
          window.signalToast("Copied.", "success");
        }).catch(() => {
          this.keyMessage = "Could not copy. Copy it manually.";
          window.signalToast(this.keyMessage, "error");
        });
      },
      formatDate(dateStr) {
        if (!dateStr) return "never";
        const date = new Date(dateStr);
        const seconds = Math.max(Math.floor((new Date() - date) / 1000), 0);
        if (seconds < 60) return "just now";
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return date.toLocaleDateString();
      },
      slackStatus() {
        if (!this.settings?.organization) return "";
        if (!this.settings.organization.slack_notifications_enabled) return "Dashboard only is active.";
        if (this.settings.organization.slack_configured) return "Slack delivery is active.";
        return "Slack delivery is selected, but Slack is not fully configured.";
      },
    };
  }
</script>
{% endblock %}
