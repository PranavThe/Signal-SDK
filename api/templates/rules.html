{% extends "base.html" %}

{% block title %}Signal Rules{% endblock %}

{% block content %}
<div x-data='ruleActions({{ rules|tojson }})' x-init="init()" class="space-y-8">
  <header class="flex flex-col justify-between gap-3 sm:flex-row sm:items-end">
    <div>
      <p class="text-sm font-medium text-stone-500">Rules</p>
      <h1 class="mt-1 text-2xl font-semibold tracking-tight text-stone-950">Rules library</h1>
    </div>
    <p x-show="hasOrg" x-cloak class="text-sm text-stone-500">Live</p>
  </header>

  <div class="space-y-3 border-y border-stone-200 py-4">
    <input
      type="text"
      x-model="searchQuery"
      placeholder="Search rules by condition or action..."
      class="w-full border border-stone-300 px-4 py-2 text-sm outline-none focus:border-stone-950"
    />
    <div class="flex flex-wrap gap-3">
      <select x-model="filterStatus" class="border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="paused">Paused</option>
        <option value="pending_approval">Pending Approval</option>
        <option value="pending_edit">Pending Edit</option>
      </select>
      <select x-model="filterConfidence" class="border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
        <option value="">All confidence levels</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <button @click="clearFilters()" class="text-sm font-semibold text-stone-600 underline-offset-4 hover:underline">Clear filters</button>
    </div>
  </div>

  <div x-show="selectedCount > 0" x-cloak class="flex flex-col gap-3 border-b border-stone-200 py-3 sm:flex-row sm:items-center sm:justify-between">
    <p class="text-sm text-stone-600">
      <span x-text="selectedCount"></span> selected
    </p>
    <div class="flex flex-col gap-2 sm:items-end">
      <button
        @click="deleteSelected()"
        class="h-9 text-sm font-semibold text-red-700 underline-offset-4 hover:underline"
      >
        Delete selected
      </button>
      <p x-show="bulkMessage" x-text="bulkMessage" x-cloak class="text-sm text-stone-600"></p>
    </div>
  </div>

  <p x-show="pageMessage" x-text="pageMessage" x-cloak class="border-l-2 border-stone-300 pl-3 text-sm text-stone-600"></p>

  <section>
    <div x-show="selectedCount > 0" x-cloak class="mb-4 flex items-center gap-2 border-y border-stone-200 py-3">
      <input type="checkbox" :checked="allSelected" @change="toggleAll($event.target.checked)" class="h-4 w-4 accent-stone-950" />
      <label class="text-sm text-stone-600">Select all</label>
    </div>

    <div class="divide-y divide-stone-200 border-y border-stone-200">
      <template x-for="rule in filteredRules" :key="rule.id">
        <div>
          <!-- Header with checkbox and status -->
          <div class="flex items-start gap-4 py-4">
            <input type="checkbox" :checked="isSelected(rule.id)" @change="toggleSelected(rule.id, $event.target.checked)" class="mt-0.5 h-4 w-4 accent-stone-950" />
            <div class="flex min-w-0 flex-1 items-start justify-between gap-4">
              <div class="min-w-0 flex-1">
                <div class="flex flex-wrap items-center gap-2">
                  <span :class="statusClass(rule.status)" class="text-xs font-semibold uppercase tracking-wide" x-text="rule.status"></span>
                  <span class="text-xs text-stone-400">·</span>
                  <span class="text-xs text-stone-500" x-text="rule.confidence + ' confidence'"></span>
                  <span class="text-xs text-stone-400">·</span>
                  <span class="text-xs text-stone-500" x-text="rule.trigger_count + ' triggers'"></span>
                </div>
              </div>
              <div class="flex shrink-0 items-center gap-3">
                <button
                  @click="toggleActive(rule)"
                  :disabled="!canToggle(rule)"
                  class="text-xs font-semibold text-stone-950 underline-offset-4 hover:underline disabled:cursor-not-allowed disabled:text-stone-300 disabled:no-underline"
                  :aria-label="rule.status === 'active' ? 'Pause rule' : 'Activate rule'"
                  x-text="rule.status === 'active' ? 'Pause' : 'Activate'"
                ></button>
                <button @click="deleteRules([rule.id])" class="text-xs font-semibold text-red-700 underline-offset-4 hover:underline">Delete</button>
              </div>
            </div>
          </div>
          <p x-show="ruleMessage(rule.id)" x-text="ruleMessage(rule.id)" x-cloak class="pb-3 pl-8 text-sm text-stone-600"></p>

          <!-- Rule content -->
          <a :href="`/dashboard/rules/${rule.id}`" class="block pb-5 pl-8">
            <div class="grid gap-4 lg:grid-cols-[1fr_auto_1fr]">
              <div>
                <p class="text-xs font-semibold uppercase tracking-wide text-stone-500">When</p>
                <p class="mt-2 text-sm font-medium leading-relaxed text-stone-950" x-text="rule.condition"></p>
              </div>
              <div class="hidden items-center lg:flex">
                <svg class="h-5 w-5 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
              </div>
              <div>
                <p class="text-xs font-semibold uppercase tracking-wide text-stone-500">Do</p>
                <p class="mt-2 text-sm leading-relaxed text-stone-700" x-text="rule.action"></p>
              </div>
            </div>
            <div class="mt-4" x-show="rule.exceptions_note">
              <p class="text-xs font-semibold uppercase tracking-wide text-stone-500">Exceptions</p>
              <p class="mt-2 text-sm leading-relaxed text-stone-600" x-text="rule.exceptions_note"></p>
            </div>

            <!-- Metadata footer -->
            <div class="mt-4 flex flex-wrap gap-x-4 gap-y-1 border-t border-stone-100 pt-3 text-xs text-stone-500">
              <span x-show="rule.last_triggered" x-text="'Last triggered: ' + rule.last_triggered"></span>
              <span x-text="'Created: ' + rule.created"></span>
            </div>
          </a>
        </div>
      </template>

      <div x-show="filteredRules.length === 0 && rules.length === 0" x-cloak class="border-y border-stone-200 py-12 text-center">
        <p class="text-sm text-stone-500">No rules yet.</p>
      </div>
      <div x-show="filteredRules.length === 0 && rules.length > 0" x-cloak class="border-y border-stone-200 py-12 text-center">
        <p class="text-sm text-stone-500">No rules match your search criteria.</p>
      </div>
    </div>
  </section>
</div>

<script>
  function ruleActions(initialRules) {
    return {
      hasOrg: {{ 'true' if current_org else 'false' }},
      pageMessage: "",
      bulkMessage: "",
      ruleMessages: {},
      rules: initialRules || [],
      selected: [],
      searchQuery: "",
      filterStatus: "",
      filterConfidence: "",
      refreshInterval: null,
      get filteredRules() {
        let filtered = this.rules;

        // Search filter
        if (this.searchQuery.trim()) {
          const query = this.searchQuery.toLowerCase();
          filtered = filtered.filter(rule =>
            (rule.condition || "").toLowerCase().includes(query) ||
            (rule.action || "").toLowerCase().includes(query)
          );
        }

        // Status filter
        if (this.filterStatus) {
          filtered = filtered.filter(rule => rule.status === this.filterStatus);
        }

        // Confidence filter
        if (this.filterConfidence) {
          filtered = filtered.filter(rule => this.confidenceBucket(rule.confidence) === this.filterConfidence);
        }

        return filtered;
      },
      get selectedCount() {
        return this.selected.length;
      },
      get allSelected() {
        return this.filteredRules.length > 0 && this.filteredRules.every((rule) => this.selected.includes(rule.id));
      },
      init() {
        this.rules = (initialRules || []).map((rule) => this.normalizeRule(rule));
        if (!this.hasOrg) {
          this.pageMessage = "Select an organization from Organizations to load rules.";
          return;
        }
        this.load(false);
        this.refreshInterval = setInterval(() => this.load(false), 5000);
        window.addEventListener("beforeunload", () => {
          if (this.refreshInterval) clearInterval(this.refreshInterval);
        });
      },
      clearFilters() {
        this.searchQuery = "";
        this.filterStatus = "";
        this.filterConfidence = "";
      },
      headers() {
        return {
          "Content-Type": "application/json",
        };
      },
      requireOrg() {
        if (this.hasOrg) return true;
        this.pageMessage = "Select an organization from Organizations first.";
        return false;
      },
      confidenceBucket(confidence) {
        const value = Number.parseInt(String(confidence || "0").replace("%", ""), 10);
        if (value >= 80) return "high";
        if (value >= 50) return "medium";
        return "low";
      },
      normalizeRule(rule) {
        const confidence = rule.confidence || `${Math.round((rule.extraction_confidence || 0) * 100)}%`;
        return {
          ...rule,
          condition: rule.condition || rule.condition_description || "",
          action: rule.action || rule.action_description || "",
          confidence,
          trigger_count: rule.trigger_count || 0,
          last_triggered: rule.last_triggered || this.timeAgo(rule.last_triggered_at),
          created: rule.created || this.timeAgo(rule.created_at),
        };
      },
      timeAgo(value) {
        if (!value) return "-";
        const then = new Date(value).getTime();
        if (Number.isNaN(then)) return "-";
        const seconds = Math.max(Math.floor((Date.now() - then) / 1000), 0);
        if (seconds < 60) return "just now";
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        return `${Math.floor(hours / 24)}d ago`;
      },
      async load(showErrors = true) {
        if (!this.hasOrg) return;
        const response = await fetch("/admin/rules?limit=100", {
          credentials: "include",
          headers: this.headers(),
        });
        if (!response.ok) {
          if (showErrors) this.pageMessage = await this.failureMessage(response, `Could not refresh rules (${response.status}).`);
          return;
        }
        const data = await response.json();
        this.rules = (data.items || []).map((rule) => this.normalizeRule(rule));
        const visibleIds = new Set(this.rules.map((rule) => rule.id));
        this.selected = this.selected.filter((id) => visibleIds.has(id));
      },
      statusClass(status) {
        if (status === "active") return "text-emerald-700";
        if (status === "paused" || status === "pending_approval" || status === "pending_edit") return "text-amber-700";
        return "text-stone-500";
      },
      canToggle(rule) {
        return rule.status === "active" || rule.status === "paused";
      },
      ruleMessage(ruleId) {
        return this.ruleMessages[ruleId] || "";
      },
      setRuleMessage(ruleId, value) {
        this.ruleMessages = { ...this.ruleMessages, [ruleId]: value };
      },
      isSelected(ruleId) {
        return this.selected.includes(ruleId);
      },
      toggleSelected(ruleId, checked) {
        this.selected = checked
          ? Array.from(new Set([...this.selected, ruleId]))
          : this.selected.filter((id) => id !== ruleId);
      },
      toggleAll(checked) {
        this.selected = checked ? this.filteredRules.map((rule) => rule.id) : [];
      },
      async failureMessage(response, fallback) {
        let data = null;
        try {
          data = await response.json();
        } catch {
          return fallback;
        }

        const detail = data?.detail;
        if (typeof detail === "string") return detail;
        if (!detail) return fallback;

        const conflicts = detail.conflicts || [];
        if (conflicts.length === 0) {
          return detail.message || fallback;
        }

        const first = conflicts[0];
        return [
          detail.message || "This change conflicts with another rule.",
          `"${first.existing_condition} → ${first.existing_action}"`,
          first.explanation,
        ].filter(Boolean).join(" ");
      },
      async updateStatus(rule, status) {
        if (!this.requireOrg()) return;
        const previous = rule.status;
        rule.status = status;
        const response = await fetch(`/admin/rules/${rule.id}`, {
          method: "PATCH",
          credentials: "include",
          headers: this.headers(),
          body: JSON.stringify({ status }),
        });
        if (!response.ok) {
          rule.status = previous;
          this.setRuleMessage(rule.id, await this.failureMessage(response, `Update failed (${response.status}).`));
          return;
        }
        await this.load(false);
        this.setRuleMessage(rule.id, status === "active" ? "Rule activated." : "Rule paused.");
      },
      async toggleActive(rule) {
        if (!this.canToggle(rule)) return;
        await this.updateStatus(rule, rule.status === "active" ? "paused" : "active");
      },
      async deleteSelected() {
        await this.deleteRules(this.selected);
      },
      async deleteRules(ruleIds) {
        if (!this.requireOrg() || ruleIds.length === 0) return;
        const label = ruleIds.length === 1 ? "this rule" : `${ruleIds.length} rules`;
        if (!window.confirm(`Delete ${label}?`)) return;
        const response = await fetch("/admin/rules/delete", {
          method: "POST",
          credentials: "include",
          headers: this.headers(),
          body: JSON.stringify({ rule_ids: ruleIds }),
        });
        if (!response.ok) {
          const errorMessage = await this.failureMessage(response, `Delete failed (${response.status}).`);
          if (ruleIds.length === 1) this.setRuleMessage(ruleIds[0], errorMessage);
          else this.bulkMessage = errorMessage;
          return;
        }
        const data = await response.json();
        const deleted = data.deleted || ruleIds;
        this.rules = this.rules.filter((rule) => !deleted.includes(rule.id));
        this.selected = this.selected.filter((id) => !deleted.includes(id));
        await this.load(false);
        this.bulkMessage = deleted.length === 1 ? "Rule deleted." : `${deleted.length} rules deleted.`;
      },
    };
  }
</script>
{% endblock %}
