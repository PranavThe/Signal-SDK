{% extends "base.html" %}

{% block title %}Signal Rules{% endblock %}

{% block content %}
<div x-data='ruleActions({{ rules|tojson }})' class="space-y-8">
  <header>
    <p class="text-sm font-medium text-stone-500">Rules</p>
    <h1 class="mt-1 text-2xl font-semibold tracking-tight text-stone-950">Rules library</h1>
  </header>

  <div class="flex flex-col gap-3 border-y border-stone-200 py-3 sm:flex-row sm:items-center sm:justify-between">
    <p class="text-sm text-stone-600">
      <span x-text="selectedCount"></span> selected
    </p>
    <button
      @click="deleteSelected()"
      :disabled="selectedCount === 0"
      class="h-9 text-sm font-semibold text-red-700 underline-offset-4 hover:underline disabled:cursor-not-allowed disabled:text-stone-300 disabled:no-underline"
    >
      Delete selected
    </button>
  </div>

  <p x-show="message" x-text="message" x-cloak class="border-l-2 border-stone-300 pl-3 text-sm text-stone-600"></p>

  <section>
    <div class="overflow-x-auto">
      <table class="min-w-[1200px] border-y border-stone-200 text-sm">
        <thead class="border-b border-stone-200 text-left text-stone-500">
          <tr>
            <th class="w-10 py-3 pr-4">
              <input type="checkbox" :checked="allSelected" @change="toggleAll($event.target.checked)" class="h-4 w-4 accent-stone-950" />
            </th>
            <th class="w-[360px] px-4 py-3 font-medium">Condition</th>
            <th class="w-[320px] px-4 py-3 font-medium">Action</th>
            <th class="px-4 py-3 font-medium">Status</th>
            <th class="px-4 py-3 font-medium">Confidence</th>
            <th class="px-4 py-3 font-medium">Triggers</th>
            <th class="px-4 py-3 font-medium">Last Triggered</th>
            <th class="px-4 py-3 font-medium">Created</th>
            <th class="py-3 pl-4 font-medium"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-stone-100">
          <template x-for="rule in rules" :key="rule.id">
            <tr class="align-top">
              <td class="py-4 pr-4">
                <input type="checkbox" :checked="isSelected(rule.id)" @change="toggleSelected(rule.id, $event.target.checked)" class="h-4 w-4 accent-stone-950" />
              </td>
              <td class="w-[360px] px-4 py-4">
                <a :href="`/dashboard/rules/${rule.id}`" class="font-medium text-stone-950 hover:underline" x-text="rule.condition"></a>
              </td>
              <td class="w-[320px] px-4 py-4 text-stone-600" x-text="rule.action"></td>
              <td class="px-4 py-4">
                <span :class="statusClass(rule.status)" class="whitespace-nowrap text-xs font-semibold uppercase tracking-wide" x-text="rule.status"></span>
              </td>
              <td class="px-4 py-4 text-stone-600" x-text="rule.confidence"></td>
              <td class="px-4 py-4 text-stone-600" x-text="rule.trigger_count"></td>
              <td class="px-4 py-4 text-stone-600" x-text="rule.last_triggered"></td>
              <td class="px-4 py-4 text-stone-600" x-text="rule.created"></td>
              <td class="py-4 pl-4">
                <div class="flex items-center gap-3">
                  <button
                    @click="toggleActive(rule)"
                    :disabled="!canToggle(rule)"
                    class="text-xs font-semibold text-stone-950 underline-offset-4 hover:underline disabled:cursor-not-allowed disabled:text-stone-300 disabled:no-underline"
                    :aria-label="rule.status === 'active' ? 'Pause rule' : 'Activate rule'"
                    x-text="rule.status === 'active' ? 'Pause' : 'Activate'"
                  ></button>
                  <button @click="deleteRules([rule.id])" class="text-xs font-semibold text-red-700 underline-offset-4 hover:underline">Delete</button>
                </div>
              </td>
            </tr>
          </template>
          <tr x-show="rules.length === 0" x-cloak>
            <td colspan="9" class="px-4 py-8 text-center text-stone-500">No rules yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<script>
  function ruleActions(initialRules) {
    return {
      apiKey: sessionStorage.getItem("signal_api_key") || "",
      message: "",
      rules: initialRules,
      selected: [],
      get selectedCount() {
        return this.selected.length;
      },
      get allSelected() {
        return this.rules.length > 0 && this.selected.length === this.rules.length;
      },
      headers() {
        return {
          "Authorization": `Bearer ${this.apiKey}`,
          "Content-Type": "application/json",
        };
      },
      requireKey() {
        if (this.apiKey) return true;
        this.message = "Please configure your API key in Settings first.";
        return false;
      },
      statusClass(status) {
        if (status === "active") return "text-emerald-700";
        if (status === "paused" || status === "pending_approval" || status === "pending_edit") return "text-amber-700";
        return "text-stone-500";
      },
      canToggle(rule) {
        return rule.status === "active" || rule.status === "paused";
      },
      isSelected(ruleId) {
        return this.selected.includes(ruleId);
      },
      toggleSelected(ruleId, checked) {
        this.selected = checked
          ? Array.from(new Set([...this.selected, ruleId]))
          : this.selected.filter((id) => id !== ruleId);
      },
      toggleAll(checked) {
        this.selected = checked ? this.rules.map((rule) => rule.id) : [];
      },
      async failureMessage(response, fallback) {
        let data = null;
        try {
          data = await response.json();
        } catch {
          return fallback;
        }

        const detail = data?.detail;
        if (typeof detail === "string") return detail;
        if (!detail) return fallback;

        const conflicts = detail.conflicts || [];
        if (conflicts.length === 0) {
          return detail.message || fallback;
        }

        const first = conflicts[0];
        return [
          detail.message || "This change conflicts with another rule.",
          `"${first.existing_condition} → ${first.existing_action}"`,
          first.explanation,
        ].filter(Boolean).join(" ");
      },
      async updateStatus(rule, status) {
        if (!this.requireKey()) return;
        const previous = rule.status;
        rule.status = status;
        const response = await fetch(`/v1/rules/${rule.id}`, {
          method: "PATCH",
          headers: this.headers(),
          body: JSON.stringify({ status }),
        });
        if (!response.ok) {
          rule.status = previous;
          this.message = await this.failureMessage(response, `Update failed (${response.status}).`);
          return;
        }
        this.message = status === "active" ? "Rule activated." : "Rule paused.";
      },
      async toggleActive(rule) {
        if (!this.canToggle(rule)) return;
        await this.updateStatus(rule, rule.status === "active" ? "paused" : "active");
      },
      async deleteSelected() {
        await this.deleteRules(this.selected);
      },
      async deleteRules(ruleIds) {
        if (!this.requireKey() || ruleIds.length === 0) return;
        const label = ruleIds.length === 1 ? "this rule" : `${ruleIds.length} rules`;
        if (!window.confirm(`Delete ${label}?`)) return;
        const response = await fetch("/v1/rules/delete", {
          method: "POST",
          headers: this.headers(),
          body: JSON.stringify({ rule_ids: ruleIds }),
        });
        if (!response.ok) {
          this.message = await this.failureMessage(response, `Delete failed (${response.status}).`);
          return;
        }
        const data = await response.json();
        const deleted = data.deleted || ruleIds;
        this.rules = this.rules.filter((rule) => !deleted.includes(rule.id));
        this.selected = this.selected.filter((id) => !deleted.includes(id));
        this.message = deleted.length === 1 ? "Rule deleted." : `${deleted.length} rules deleted.`;
      },
    };
  }
</script>
{% endblock %}
